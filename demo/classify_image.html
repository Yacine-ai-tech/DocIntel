<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DocIntel — /classify-image Demo</title>
<style>
body { background:#0f172a; color:#f1f5f9; font:14px/1.5 system-ui; margin:0; padding:32px; }
h1 { margin:0 0 4px; }
.sub { color:#94a3b8; margin-bottom:24px; }
.drop { border:2px dashed #475569; border-radius:12px; padding:48px; text-align:center; cursor:pointer; }
.drop.hover { border-color:#6366f1; background:#1e293b; }
input, button { background:#1e293b; color:#f1f5f9; border:1px solid #475569; border-radius:6px; padding:8px 12px; }
button { background:#6366f1; border-color:#6366f1; cursor:pointer; }
.row { margin:16px 0; }
pre { background:#1e293b; border:1px solid #334155; padding:16px; border-radius:8px; }
.badge { display:inline-block; background:#1e293b; border:1px solid #22c55e; color:#86efac; padding:4px 12px; border-radius:20px; }
</style>
</head>
<body>
<h1>/classify-image — Auction-Listing Pattern</h1>
<div class="sub">Drop an image, enter candidate categories, see vision-LLM classification.</div>

<div class="row">
  <label>Categories (comma-separated):
    <input id="categories" value="tractor,lathe,crane,forklift,excavator" size="60">
  </label>
</div>

<div id="drop" class="drop">
  Drop an image here, or click<br>
  <input type="file" id="file" style="display:none" accept="image/*">
</div>

<div id="results"></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const results = document.getElementById('results');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('hover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('hover');
  if (e.dataTransfer.files.length) classify(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => e.target.files.length && classify(e.target.files[0]));

async function classify(file) {
  const cats = document.getElementById('categories').value;
  results.innerHTML = 'Classifying...';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('categories', cats);
  const r = await fetch('/classify-image', { method: 'POST', body: fd });
  const data = await r.json();
  results.innerHTML = `
    <div class="row"><span class="badge">${data.category}</span> confidence: ${(data.confidence ?? 0).toFixed(2)}</div>
    <pre>${JSON.stringify(data, null, 2)}</pre>`;
}
</script>
</body>
</html>
