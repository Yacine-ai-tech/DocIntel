<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DocIntel Demo</title>
<style>
body { background: #0f172a; color: #f1f5f9; font: 14px/1.5 system-ui, sans-serif; margin: 0; padding: 32px; }
h1 { font-weight: 600; margin: 0 0 4px; }
.sub { color: #94a3b8; margin-bottom: 24px; }
.drop { border: 2px dashed #475569; border-radius: 12px; padding: 64px; text-align: center; cursor: pointer; transition: 0.15s; }
.drop.hover { border-color: #6366f1; background: #1e293b; }
.controls { margin: 16px 0; display: flex; gap: 16px; flex-wrap: wrap; }
select, button { background: #1e293b; color: #f1f5f9; border: 1px solid #475569; border-radius: 6px; padding: 8px 12px; font-size: 13px; }
button { cursor: pointer; background: #6366f1; border-color: #6366f1; }
button:disabled { opacity: 0.5; cursor: wait; }
.results { margin-top: 24px; }
.badge { display: inline-block; background: #1e293b; border: 1px solid #6366f1; color: #a5b4fc; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-right: 8px; }
pre { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; overflow: auto; max-height: 600px; }
.meta { color: #94a3b8; font-size: 12px; margin: 8px 0; }
</style>
</head>
<body>
<h1>DocIntel</h1>
<div class="sub">Vision-first document AI. Drop a PDF or image.</div>

<div class="controls">
  <label>Route:
    <select id="route">
      <option value="vision_premium">vision_premium (Claude Vision)</option>
      <option value="vision_local">vision_local (Ollama)</option>
      <option value="ocr_fallback">ocr_fallback (Tesseract + LLM)</option>
    </select>
  </label>
  <label>Doc type:
    <select id="doctype">
      <option value="invoice">invoice</option>
      <option value="contract">contract</option>
      <option value="receipt">receipt</option>
      <option value="financial_report">financial_report</option>
      <option value="auction_listing">auction_listing</option>
      <option value="default">default</option>
    </select>
  </label>
</div>

<div id="drop" class="drop">
  Drop a PDF/image here, or click to select<br>
  <input type="file" id="file" style="display:none" accept="image/*,application/pdf">
</div>

<div id="results" class="results"></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const results = document.getElementById('results');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('hover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
drop.addEventListener('drop', async e => {
  e.preventDefault();
  drop.classList.remove('hover');
  if (e.dataTransfer.files.length) await process(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', async e => {
  if (e.target.files.length) await process(e.target.files[0]);
});

async function process(file) {
  const route = document.getElementById('route').value;
  const docType = document.getElementById('doctype').value;
  results.innerHTML = '<div class="meta">Processing...</div>';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('route', route);
  fd.append('doc_type', docType);

  try {
    const r = await fetch('/extract', { method: 'POST', body: fd });
    const data = await r.json();
    render(data);
  } catch (err) {
    results.innerHTML = `<pre>Error: ${err}</pre>`;
  }
}

function render(data) {
  const ms = data.processing_time_ms ?? '?';
  results.innerHTML = `
    <div>
      <span class="badge">${data.doc_type || 'unknown'}</span>
      <span class="badge">${data.route}</span>
      <span class="badge">${ms} ms</span>
    </div>
    <div class="meta">Extracted fields:</div>
    <pre>${JSON.stringify(data.fields, null, 2)}</pre>
  `;
}
</script>
</body>
</html>
